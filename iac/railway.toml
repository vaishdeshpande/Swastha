# iac/railway.toml — Railway deployment configuration
# Deploy: connect this repo in Railway dashboard → select "railway.toml" config

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "hospital-receptionist"

[services.variables]
# These are set in the Railway dashboard — do NOT commit values here.
# Reference: .env.example in the project root.
PORT = "8000"
LOG_LEVEL = "INFO"
LANGCHAIN_TRACING_V2 = "false"
